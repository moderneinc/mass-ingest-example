[global]
; Configure a private PyPI index
; Uncomment and update the following lines as needed

; Set the default index URL
index-url = https://your-private-registry.example.com/simple/

; Additional index URLs (searched in addition to index-url)
; extra-index-url = https://pypi.org/simple/

; Trust self-signed certificates for private registries
; trusted-host = your-private-registry.example.com
